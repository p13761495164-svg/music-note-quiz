<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description" content="离线可运行的音符识谱练习">
  <meta name="theme-color" content="#553c30">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="识谱练习">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icon-192.png">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <title>音符识谱练习</title>
  <style>
    :root {
      color-scheme: light;
      --bg: hsl(40 33% 96%);
      --fg: hsl(20 20% 15%);
      --muted: hsl(25 10% 45%);
      --border: hsl(30 15% 85%);
      --card: hsl(40 33% 98%);
      --primary: hsl(20 25% 25%);
      --secondary: hsl(35 25% 90%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--fg);
    }
    button, select { font: inherit; }
    button { touch-action: manipulation; }

    main {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      width: min(672px, 100%);
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
      border-radius: 12px;
      background: var(--card);
      box-shadow: 0 14px 30px rgba(45, 34, 28, .12);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
    }
    h1 {
      margin: 0;
      font: 700 24px/1.2 Georgia, "Times New Roman", serif;
    }
    .subtitle, .score-label {
      color: var(--muted);
      font-size: 13px;
    }
    .subtitle { margin-top: 5px; }
    .score { text-align: right; }
    .score-label {
      font-weight: 700;
      letter-spacing: .13em;
    }
    .score-value {
      margin-top: 2px;
      color: var(--primary);
      font: 700 24px/1.1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .score-value span { color: var(--muted); font-size: 19px; }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px;
    }

    .settings {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: stretch;
      gap: 10px;
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--border) 55%, transparent);
      border-radius: 9px;
      background: color-mix(in srgb, var(--secondary) 36%, transparent);
    }
    .setting {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 6px;
    }
    .setting-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.1;
    }
    select {
      width: 100%;
      min-height: 34px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--card);
      color: var(--fg);
    }
    .segmented {
      display: flex;
      width: 100%;
      gap: 2px;
      padding: 3px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--card);
    }
    .segmented button {
      flex: 1 1 0;
      min-width: 0;
      min-height: 30px;
      padding: 0 5px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: var(--fg);
      font-size: 14px;
      cursor: pointer;
    }
    .segmented button.active {
      background: var(--primary);
      color: var(--bg);
    }
    .radio-group {
      display: flex;
      width: 100%;
      gap: 2px;
      padding: 3px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--card);
    }
    .radio-choice {
      position: relative;
      flex: 1 1 0;
      min-width: 0;
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      border-radius: 5px;
      color: var(--fg);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .radio-choice input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .radio-choice:has(input:checked) {
      background: var(--primary);
      color: var(--bg);
    }
    .sound-count-group { gap: 3px; }
    .sound-count-group .radio-choice {
      min-width: 0;
      padding: 0 2px;
    }
    .utility-button {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--card);
      color: var(--primary);
      font-weight: 750;
      cursor: pointer;
    }
    .utility-button.connected {
      border-color: #bbdfc4;
      background: #eaf7ed;
      color: #216b35;
    }
    .setting-status {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      min-height: 14px;
    }
    .version-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 6px;
    }
    .version-text {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .refresh-button {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 7px;
      font-size: 12px;
    }

    .install-prompt {
      width: 100%;
      display: grid;
      gap: 9px;
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--primary) 22%, var(--border));
      border-radius: 11px;
      background: color-mix(in srgb, var(--secondary) 62%, var(--card));
      box-shadow: 0 6px 16px rgba(45, 34, 28, .08);
    }
    .install-prompt[hidden] { display: none; }
    .install-title {
      margin: 0;
      color: var(--primary);
      font-size: 14px;
      font-weight: 800;
    }
    .install-text {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .audio-prompt {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid color-mix(in srgb, var(--primary) 18%, var(--border));
      border-radius: 11px;
      background: color-mix(in srgb, var(--card) 76%, var(--secondary));
    }
    .audio-prompt[hidden] { display: none; }
    .audio-prompt-text {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .audio-prompt-button {
      min-height: 34px;
      padding: 0 12px;
      white-space: nowrap;
    }
    .unlock-prompt {
      width: 100%;
      display: grid;
      gap: 9px;
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--primary) 24%, var(--border));
      border-radius: 11px;
      background: color-mix(in srgb, var(--card) 70%, var(--secondary));
    }
    .unlock-prompt[hidden] { display: none; }
    .unlock-title {
      margin: 0;
      color: var(--primary);
      font-size: 14px;
      font-weight: 850;
    }
    .unlock-text {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .unlock-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }
    .unlock-price {
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .unlock-actions button {
      min-height: 34px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--primary);
      font-weight: 800;
      cursor: pointer;
      padding: 0 10px;
    }
    .unlock-actions .primary {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
    }
    .install-actions {
      display: flex;
      gap: 8px;
    }
    .install-actions button {
      flex: 1 1 0;
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--fg);
      font-weight: 750;
      cursor: pointer;
    }
    .install-actions .primary {
      border-color: var(--primary);
      background: var(--primary);
      color: var(--bg);
    }

    .staff-shell {
      position: relative;
      width: min(560px, 100%);
      aspect-ratio: 2 / 1;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      box-shadow: 0 2px 4px rgba(45, 34, 28, .06);
    }
    #staff { display: block; width: 100%; height: 100%; }
    .replay-button {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      display: none;
      min-width: 120px;
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      background: var(--primary);
      color: var(--bg);
      font-weight: 750;
      font-size: 16px;
      box-shadow: 0 8px 22px rgba(90, 67, 56, .18);
      cursor: pointer;
    }
    .staff-shell.hidden-staff #staff { display: none; }
    .staff-shell.hidden-staff .replay-button { display: inline-flex; align-items: center; justify-content: center; }

    .feedback {
      height: 0;
      display: grid;
      place-items: center;
      margin: -6px 0 -8px;
      overflow: visible;
      position: relative;
      z-index: 3;
    }
    .feedback-pill {
      display: none;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border: 1px solid;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 650;
    }
    .feedback-pill.show { display: flex; animation: appear .18s ease-out; }
    .feedback-pill.correct { border-color: #bbdfc4; background: #eaf7ed; color: #216b35; }
    .feedback-pill.wrong { border-color: #efcaca; background: #fff0f0; color: #8c2929; }
    @keyframes appear { from { opacity: 0; transform: translateY(5px); } }

    .keyboard-scroll {
      width: 100%;
      overflow-x: auto;
      padding: 0 0 4px;
      scroll-behavior: smooth;
    }
    .keyboard {
      position: relative;
      width: 1344px;
      height: 148px;
      margin: 0 auto;
      user-select: none;
    }
    .keyboard-controls {
      width: min(448px, 100%);
      display: none;
      align-items: center;
      justify-content: center;
      margin: 0;
      position: relative;
      z-index: 4;
    }
    .keyboard-shift {
      display: none;
      min-width: 44px;
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--primary);
      font-weight: 900;
      cursor: pointer;
    }
    .keyboard-range {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .white-key, .black-key {
      position: absolute;
      bottom: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      border-radius: 0 0 7px 7px;
      cursor: pointer;
      transition: background-color .16s, color .16s, transform .08s;
      transform-origin: top;
    }
    .white-key:active, .black-key:active { transform: scaleY(.97); }
    .white-key {
      z-index: 1;
      width: 32px;
      height: 148px;
      padding-bottom: 14px;
      border: 1px solid #c9c9c9;
      background: #fff;
      color: #5b5b5b;
      font-size: 15px;
      font-weight: 650;
      box-shadow: 0 2px 3px rgba(0,0,0,.08);
    }
    .black-key {
      z-index: 2;
      top: 0;
      bottom: auto;
      width: 22px;
      height: 88px;
      padding-bottom: 8px;
      border: 1px solid #171717;
      background: #202020;
      color: #aaa;
      font-size: 11px;
      box-shadow: 0 3px 5px rgba(0,0,0,.24);
    }
    .keyboard.large {
      width: 336px;
    }
    .keyboard.large .white-key {
      width: 48px;
      font-size: 17px;
    }
    .keyboard.large .black-key {
      width: 32px;
    }
    .white-key.correct, .black-key.correct { border-color: #1f9d4c; background: #35b95d; color: #fff; }
    .white-key.wrong, .black-key.wrong { border-color: #c63636; background: #e04b4b; color: #fff; }
    .white-key.hint, .black-key.hint { border-color: #d99a14; background: #f2bd3f; color: #5a3b00; }
    .white-key[data-note="C4"] { color: #c7352e; }
    .white-key[data-note="C4"].correct,
    .white-key[data-note="C4"].wrong { color: #fff; }
    .white-key[data-note="C4"].hint { color: #5a3b00; }

    .next {
      display: none;
      min-height: 38px;
      padding: 0 17px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--card);
      color: var(--fg);
      cursor: pointer;
    }
    .next.show { display: block; }

    @media (max-width: 560px) {
      main { display: block; padding: 10px 0 0; }
      .card { min-height: 100dvh; border: 0; border-radius: 0; box-shadow: none; }
      header, .content { padding: 18px; }
      .content { gap: 10px; }
      .settings {
        gap: 8px;
        padding: 10px;
      }
      .keyboard { margin-inline: 18px; }
      .keyboard-controls { width: calc(100% - 36px); }
    }

    @media (orientation: landscape) and (max-height: 560px) {
      main { display: block; padding: 0; }
      .card {
        width: 100%;
        min-height: 100dvh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }
      header { padding: 12px 18px; }
      .content {
        padding: 12px 8px 8px;
        gap: 8px;
      }
      .settings {
        max-width: 760px;
        padding: 9px;
        gap: 7px 10px;
      }
      .staff-shell { width: min(620px, 100%); }
      .keyboard-scroll {
        width: 100%;
        padding-inline: 0;
      }
      .keyboard { margin-inline: 0; }
    }

    @media (orientation: landscape) and (min-width: 768px) {
      main {
        display: block;
        padding: 0;
      }
      .card {
        width: 100%;
        min-height: 100dvh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }
      header {
        padding: 14px max(22px, env(safe-area-inset-left)) 14px max(22px, env(safe-area-inset-right));
      }
      .content {
        width: 100%;
        padding: 14px max(12px, env(safe-area-inset-left)) 10px max(12px, env(safe-area-inset-right));
        gap: 9px;
      }
      .settings {
        width: min(860px, 100%);
      }
      .staff-shell {
        width: min(760px, 100%);
      }
      .keyboard-scroll {
        width: 100%;
        padding-inline: 0;
      }
      .keyboard {
        margin-inline: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-label="识谱练习">
      <header>
        <div>
          <h1>识谱练习</h1>
          <div class="subtitle">Note Reading Practice</div>
        </div>
        <div class="score" aria-live="polite">
          <div class="score-label">分数</div>
          <div class="score-value"><b id="correct-score">0</b> <span>/ <b id="total-score">0</b></span></div>
        </div>
      </header>

      <div class="content">
        <div id="install-prompt" class="install-prompt" hidden>
          <p class="install-title">添加到桌面</p>
          <p id="install-text" class="install-text">把识谱练习安装到桌面，下次可以像 App 一样打开。</p>
          <div class="install-actions">
            <button id="install-button" class="primary" type="button">安装</button>
            <button id="install-dismiss-button" type="button">稍后</button>
          </div>
        </div>
        <div id="audio-prompt" class="audio-prompt" hidden>
          <p class="audio-prompt-text">使用 MIDI 键盘前，请点一次开启声音。iOS 需要触屏授权后才能自动播放题目声音。</p>
          <button id="audio-enable-button" class="utility-button audio-prompt-button" type="button">开启声音</button>
        </div>
        <div id="unlock-prompt" class="unlock-prompt" hidden>
          <p id="unlock-title" class="unlock-title">解锁全部调号</p>
          <p id="unlock-text" class="unlock-text">C 大调可免费使用。解锁后可练习全部 12 个调。</p>
          <div class="unlock-actions">
            <span id="unlock-price" class="unlock-price"></span>
            <button id="restore-purchase-button" type="button">恢复购买</button>
            <button id="unlock-keys-button" class="primary" type="button">解锁全部调号</button>
          </div>
        </div>

        <div class="settings">
          <label class="setting">
            <span id="language-label" class="setting-label">语言:</span>
            <select id="language-select" aria-label="语言">
              <option value="zh">中文</option>
              <option value="ja">日本語</option>
              <option value="en">English</option>
            </select>
          </label>
          <label class="setting">
            <span id="key-label" class="setting-label">调号:</span>
            <select id="key-signature" aria-label="调号"></select>
          </label>
          <div class="setting">
            <span id="clef-label" class="setting-label">谱号:</span>
            <div class="segmented" role="group" aria-label="谱号">
              <button id="treble-button" class="active" type="button" aria-pressed="true">高音</button>
              <button id="bass-button" type="button" aria-pressed="false">低音</button>
            </div>
          </div>
          <div class="setting">
            <span id="note-label" class="setting-label">音符:</span>
            <div class="radio-group" role="radiogroup" aria-label="音符显示">
              <label class="radio-choice"><input type="radio" name="note-label-mode" value="letter"><span id="note-letter-label">音高</span></label>
              <label class="radio-choice"><input type="radio" name="note-label-mode" value="degree"><span id="note-degree-label">级数</span></label>
              <label class="radio-choice"><input type="radio" name="note-label-mode" value="none" checked><span id="note-none-label">隐藏</span></label>
            </div>
          </div>
          <div class="setting">
            <span id="staff-label" class="setting-label">谱面:</span>
            <div class="segmented" role="group" aria-label="五线谱显示">
              <button id="show-staff-button" class="active" type="button" aria-pressed="true">显示</button>
              <button id="hide-staff-button" type="button" aria-pressed="false">隐藏</button>
            </div>
          </div>
          <label class="setting">
            <span id="sound-label" class="setting-label">声音:</span>
            <div class="radio-group sound-count-group" role="radiogroup" aria-label="声音个数">
              <label class="radio-choice"><input type="radio" name="sound-count" value="1" checked>1</label>
              <label class="radio-choice"><input type="radio" name="sound-count" value="2">2</label>
              <label class="radio-choice"><input type="radio" name="sound-count" value="3">3</label>
              <label class="radio-choice"><input type="radio" name="sound-count" value="4">4</label>
              <label class="radio-choice"><input type="radio" name="sound-count" value="5">5</label>
            </div>
          </label>
          <div class="setting">
            <span id="difficulty-label" class="setting-label">难度:</span>
            <div class="segmented" role="group" aria-label="难度">
              <button id="easy-button" class="active" type="button" aria-pressed="true">易</button>
              <button id="hard-button" type="button" aria-pressed="false">难</button>
            </div>
          </div>
          <div class="setting">
            <span id="keyboard-label" class="setting-label">琴键:</span>
            <div class="segmented" role="group" aria-label="琴键大小">
              <button id="small-keyboard-button" class="active" type="button" aria-pressed="true">小</button>
              <button id="large-keyboard-button" type="button" aria-pressed="false">大</button>
            </div>
          </div>
          <div class="setting">
            <span id="midi-label" class="setting-label">MIDI:</span>
            <button id="midi-connect-button" class="utility-button" type="button">连接钢琴</button>
            <div id="midi-status" class="setting-status">USB / 蓝牙 MIDI</div>
          </div>
          <div class="setting">
            <span id="screen-label" class="setting-label">屏幕:</span>
            <div id="wake-lock-status" class="setting-status">练习时保持亮屏</div>
          </div>
          <div class="setting">
            <span id="version-label" class="setting-label">版本:</span>
            <div class="version-row">
              <span id="app-version" class="version-text">Web v--</span>
              <button id="force-update-button" class="utility-button refresh-button" type="button">强制更新</button>
            </div>
          </div>
        </div>

        <div id="staff-shell" class="staff-shell">
          <svg id="staff" viewBox="0 0 300 120" role="img" aria-label="五线谱题目"></svg>
          <button id="replay-button" class="replay-button" type="button">重听</button>
        </div>

        <div class="feedback" aria-live="polite">
          <div id="feedback-pill" class="feedback-pill"></div>
        </div>

        <div class="keyboard-controls" aria-label="Keyboard range controls">
          <button id="keyboard-left" class="keyboard-shift" type="button" aria-label="Lower keyboard range">‹</button>
          <div id="keyboard-range" class="keyboard-range">C4-B4</div>
          <button id="keyboard-right" class="keyboard-shift" type="button" aria-label="Higher keyboard range">›</button>
        </div>
        <div id="keyboard-scroll" class="keyboard-scroll">
          <div id="keyboard" class="keyboard" aria-label="钢琴键盘"></div>
        </div>

        <button id="next-button" class="next" type="button">下一题</button>

      function availableQuestionNotes() {
        const notes = [];
        for (let octave = 0; octave <= 8; octave += 1) {
          NOTE_LETTERS.forEach(letter => {
            const midi = (octave + 1) * 12 + pitchClass(letter);
            if (midi < PIANO_LOW_MIDI || midi > PIANO_HIGH_MIDI) return;
            const step = staffStep(letter, octave, clef);
            if (Math.abs(step) <= MAX_LEDGER_STEP) notes.push([letter, octave, step]);
          });
        }
        return notes;
      }

      function randomNote(excluded = []) {
        const notes = availableQuestionNotes();
        const candidates = notes.filter(note => !excluded.some(item => item[0] === note[0] && item[1] === note[1]));
        return candidates[Math.floor(Math.random() * candidates.length)];
      }

      function generateQuestionNotes() {
        if (difficulty === "easy" && soundCount > 1) {
          const candidates = availableQuestionNotes();
          for (let attempt = 0; attempt < 300; attempt += 1) {
            const notes = [];
            while (notes.length < soundCount) {
              const possible = candidates.filter(note => {
                if (notes.some(item => item[0] === note[0] && item[1] === note[1])) return false;
                const midiValues = notes.concat([note]).map(noteMidi);
                return Math.max(...midiValues) - Math.min(...midiValues) <= 12;
              });
              if (!possible.length) break;
              notes.push(possible[Math.floor(Math.random() * possible.length)]);
            }
            if (notes.length === soundCount) return notes;
          }
        }
        const notes = [];
        while (notes.length < soundCount) {
          const note = randomNote(notes);
          if (!note) break;
          notes.push(note);
        }
        return notes;
      }

      }

      function clearMultiInput() {
        if (multiInputTimer !== null) {
          clearTimeout(multiInputTimer);
          multiInputTimer = null;
        }
        multiPressedValues.clear();
      }

      function clearSoundTimers() {
        soundTimers.forEach(timer => clearTimeout(timer));
        soundTimers = [];
      }

      function generateQuestion() {
        clearAdvanceTimer();
        clearMultiInput();
        clearSoundTimers();
        questionNotes = generateQuestionNotes();
        currentAnswerIndex = 0;
        currentNote = questionNotes[currentAnswerIndex] || null;
        feedbackType = null;
        showFeedback("", null);
        resetKeys();
        drawStaff();
        playQuestionNotes();
      }

      function expectedKey(note = currentNote) {
        if (!note) return "";
        const accidental = KEY_SIGNATURES[keySig].accidentals.find(item => item[0] === note[0]);
        if (!accidental) return note[0];
        return note[0] + (accidental[1] === "sharp" ? "#" : "b");
      }

      function pitchClass(note) {
        const base = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 }[note[0]];
        const accidental = note.slice(1);
        if (accidental === "#") return (base + 1) % 12;
        if (accidental === "b") return (base + 11) % 12;
        return base;
      }

      function staffStep(letter, octave, targetClef = clef) {
        const index = NOTE_LETTERS.indexOf(letter);
        const absoluteStep = octave * NOTE_LETTERS.length + index;
        const trebleMiddleLine = 4 * NOTE_LETTERS.length + NOTE_LETTERS.indexOf("B");
        const bassMiddleLine = 3 * NOTE_LETTERS.length + NOTE_LETTERS.indexOf("D");
        return absoluteStep - (targetClef === "bass" ? bassMiddleLine : trebleMiddleLine);
      }

      function noteDegreeLabel(note = currentNote) {
        const tonic = pitchClass(keySig);
        const notePitch = pitchClass(expectedKey(note));
        const majorScale = [0, 2, 4, 5, 7, 9, 11];
        const interval = (notePitch - tonic + 12) % 12;
        const degree = majorScale.indexOf(interval);
        return degree >= 0 ? String(degree + 1) : "";
      }

      function getAudioContext() {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return null;
        if (!audioContext) audioContext = new AudioCtor();
        return audioContext;
      }

      function noteFrequency(note) {
        const midi = noteMidi(note);
        return midiFrequency(midi);
      }

      function currentNoteFrequency() {
        return noteFrequency(currentNote);
      }

      function noteNameFrequency(noteName, octave) {
        const basePitch = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 }[noteName[0]];
        if (!Number.isFinite(basePitch) || !Number.isInteger(octave)) return null;
        const accidental = noteName.slice(1);
        const offset = accidental === "#" ? 1 : accidental === "b" ? -1 : 0;
        const midi = (octave + 1) * 12 + basePitch + offset;
        return midiFrequency(midi);
      }

      function noteMidi(note) {
        if (!note) return null;
        const basePitch = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 }[note[0]];
        if (!Number.isFinite(basePitch)) return null;
        const accidental = expectedKey(note).slice(1);
        const offset = accidental === "#" ? 1 : accidental === "b" ? -1 : 0;
        return (note[1] + 1) * 12 + basePitch + offset;
      }

      function pitchClassFromMidi(midi) {
        return ((midi % 12) + 12) % 12;
      }

      function midiFrequency(midi) {
        if (!Number.isFinite(midi)) return null;
        return 440 * Math.pow(2, (midi - 69) / 12);
      }

      function expectedPitchLabel(note = currentNote) {
        if (!note) return "";
        return `${expectedKey(note)}${note[1]}`;
      }

      function playTone(frequency) {
        const context = frequency ? getAudioContext() : null;
        if (!context) return;

        const play = () => {
          if (context.state !== "running") return;
          const now = context.currentTime;
          const instrument = {
            wave:"sine",
            partials:[1, 4.03],
            levels:[1, 0.3],
            attack:0.004,
            decay:3,
            brightness:5200
          };
          const master = context.createGain();
          const filter = context.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(instrument.brightness, now);
          filter.Q.value = 1.8;
          master.connect(filter);
          filter.connect(context.destination);
          master.gain.setValueAtTime(0.0001, now);
          master.gain.linearRampToValueAtTime(0.33, now + instrument.attack);
          master.gain.exponentialRampToValueAtTime(0.0001, now + instrument.decay);

          instrument.partials.forEach((partial, index) => {
            const oscillator = context.createOscillator();
            const partialGain = context.createGain();
            oscillator.type = instrument.wave;
            oscillator.frequency.setValueAtTime(frequency * partial, now);
            partialGain.gain.value = instrument.levels[index] || 0.1;
            oscillator.connect(partialGain).connect(master);
            oscillator.start(now);
            oscillator.stop(now + instrument.decay + 0.08);
          });
        };

        if (context.state === "suspended") {
          context.resume().then(play).catch(() => {});
          return;
        }
        play();
      }

      function playCurrentNote() {
        const frequency = currentNoteFrequency();
        if (!frequency) return;
        clearSoundTimers();
        playTone(frequency);
      }

      function playQuestionNotes() {
        const frequencies = questionNotes.map(noteFrequency).filter(Boolean);
        if (!frequencies.length) return;
        clearSoundTimers();
        frequencies.forEach((frequency, index) => {
          if (index === 0) {
            playTone(frequency);
          } else {
            soundTimers.push(setTimeout(() => playTone(frequency), index * 650));
          }
        });
      }

      function playPressedKey(key) {
        clearSoundTimers();
        if (typeof key === "object" && Number.isFinite(key.midi)) {
          playTone(midiFrequency(key.midi));
          return;
        }
        if (!currentNote) return;
        playTone(noteNameFrequency(String(key || ""), currentNote[1]));
      }

      function midiLabel(midi) {
        const names = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        return `${names[pitchClassFromMidi(midi)]}${Math.floor(midi / 12) - 1}`;
      }

      function updateMidiStatus(message, connected = false) {
        midiStatus.textContent = message;
        midiConnectButton.classList.toggle("connected", connected);
        midiConnectButton.textContent = connected ? t("connected") : t("connectPiano");
      }

      function refreshMidiInputs() {
        if (!midiAccess) return;
        const inputs = [...midiAccess.inputs.values()];
        inputs.forEach(input => {
          input.onmidimessage = handleMidiMessage;
        });
        if (inputs.length) {
          updateMidiStatus(uiLanguage === "en" ? `${inputs.length} MIDI inputs` : uiLanguage === "ja" ? `${inputs.length} 個の MIDI 入力` : `${inputs.length} 个 MIDI 输入`, true);
        } else {
          updateMidiStatus(t("midiNone"), false);
        }
      }

      async function connectMidi() {
        unlockAudio();
        if (!("requestMIDIAccess" in navigator)) {
          updateMidiStatus(t("midiUnsupported"), false);
          return;
        }
        updateMidiStatus(t("midiRequesting"), false);
        try {
          midiAccess = await navigator.requestMIDIAccess({ sysex:false });
          midiAccess.onstatechange = refreshMidiInputs;
          refreshMidiInputs();
        } catch (_) {
          updateMidiStatus(t("midiDenied"), false);
        }
      }

      function handleMidiMessage(event) {
        const [status, midi, velocity = 0] = event.data;
        const command = status & 0xf0;
        if (command !== 0x90 || velocity === 0) return;
        handleMidiNoteOn(midi);
      }

      function handleMidiNoteOn(midi) {
        if (!Number.isFinite(midi)) return;
        const label = midiLabel(midi);
        pressKey({
          midi,
          note:label.replace(/[0-9-]+$/, ""),
          octave:Math.floor(midi / 12) - 1,
          label
        }, { playSound:false });
      }

      window.musicNoteQuizReceiveMidi = midi => handleMidiNoteOn(Number(midi));
      window.musicNoteQuizNativeMidiStatus = (message, connected = false) => {
        updateMidiStatus(String(message || "iOS MIDI"), Boolean(connected));
      };
      window.musicNoteQuizSetEntitlement = payload => {
        applyEntitlement(payload && typeof payload === "object" ? payload : {});
      };

      function showAudioPrompt() {
        if (audioUnlocked) return;
        audioPrompt.hidden = false;
      }

      function hideAudioPrompt() {
        audioPrompt.hidden = true;
      }

      function unlockAudio({ replay = true } = {}) {
        const context = getAudioContext();
        if (!context) return;
        const markUnlocked = () => {
          audioUnlocked = context.state === "running";
          if (audioUnlocked) hideAudioPrompt();
          if (audioUnlocked && replay) playQuestionNotes();
        };
        if (context.state === "running") {
          markUnlocked();
          return;
        }
        context.resume().then(markUnlocked).catch(showAudioPrompt);
      }

      function currentNoteLabel(note = currentNote) {
        if (!note || noteLabelMode === "none") return "";
        if (noteLabelMode === "letter") return expectedKey(note);
        return noteDegreeLabel(note);
      }

      function showFeedback(message, type) {
        feedbackPill.className = "feedback-pill";
        feedbackPill.textContent = "";
        nextButton.classList.toggle("show", type === "wrong");
        if (!message) return;
        feedbackPill.textContent = (type === "correct" ? "✓ " : "✕ ") + message;
        feedbackPill.classList.add("show", type);
      }

      function updateScore() {
        document.querySelector("#correct-score").textContent = score.correct;
        document.querySelector("#total-score").textContent = score.total;
      }

      function openStateDb() {
        return new Promise((resolve, reject) => {
          if (!window.indexedDB) return reject(new Error("IndexedDB unavailable"));
          const request = indexedDB.open(DB_NAME, 1);
          request.onupgradeneeded = () => request.result.createObjectStore(DB_STORE);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function writeStateToDb(saved) {
        const db = await openStateDb();
        await new Promise((resolve, reject) => {
          const transaction = db.transaction(DB_STORE, "readwrite");
          transaction.objectStore(DB_STORE).put(saved, STORAGE_KEY);
          transaction.oncomplete = resolve;
          transaction.onerror = () => reject(transaction.error);
        });
        db.close();
      }

      async function readStateFromDb() {
        const db = await openStateDb();
        const saved = await new Promise((resolve, reject) => {
          const request = db.transaction(DB_STORE, "readonly").objectStore(DB_STORE).get(STORAGE_KEY);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
        db.close();
        return saved;
      }

      function refreshSavedSettings() {
        applyLanguage();
        if (isLockedKey(keySig)) keySig = "C";
        keySelect.value = keySig;
        languageSelect.value = uiLanguage;
        trebleButton.classList.toggle("active", clef === "treble");
        bassButton.classList.toggle("active", clef === "bass");
        trebleButton.setAttribute("aria-pressed", clef === "treble");
        bassButton.setAttribute("aria-pressed", clef === "bass");
        showStaffButton.classList.toggle("active", showStaff);
        hideStaffButton.classList.toggle("active", !showStaff);
        showStaffButton.setAttribute("aria-pressed", showStaff);
        hideStaffButton.setAttribute("aria-pressed", !showStaff);
        easyButton.classList.toggle("active", difficulty === "easy");
        hardButton.classList.toggle("active", difficulty === "hard");
        easyButton.setAttribute("aria-pressed", difficulty === "easy");
        hardButton.setAttribute("aria-pressed", difficulty === "hard");
        smallKeyboardButton.classList.toggle("active", keyboardMode === "small");
        largeKeyboardButton.classList.toggle("active", keyboardMode === "large");
        smallKeyboardButton.setAttribute("aria-pressed", keyboardMode === "small");
        largeKeyboardButton.setAttribute("aria-pressed", keyboardMode === "large");
        staffShell.classList.toggle("hidden-staff", !showStaff);
        noteLabelInputs.forEach(input => { input.checked = input.value === noteLabelMode; });
        soundCountInputs.forEach(input => { input.checked = Number.parseInt(input.value, 10) === soundCount; });
        updateScore();
        drawKeyboard();
        scrollKeyboardToOctave(defaultKeyboardOctave(), "auto");
        generateQuestion();
      }

      async function restoreIndexedDbState() {
        try {
          const saved = await readStateFromDb();
          if (saved && (Number.isFinite(saved.updatedAt) ? saved.updatedAt : 0) > stateUpdatedAt) {
            applySavedState(saved);
            refreshSavedSettings();
            try {
              localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
            } catch (_) {}
          } else if (!saved) {
            saveState();
          }
        } catch (_) {
          // Some Safari file URLs do not permit persistent IndexedDB storage.
        }
      }

      function saveState() {
        stateUpdatedAt = Date.now();
        const saved = {
          keySig,
          uiLanguage,
          clef,
          correct: score.correct,
          total: score.total,
          noteLabelMode,
          showStaff,
          soundCount,
          difficulty,
          keyboardMode,
          updatedAt: stateUpdatedAt
        };
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
        } catch (_) {
          // Keep the quiz usable even when local storage is unavailable.
        }
        writeStateToDb(saved).catch(() => {});
      }

      function setKeyState(note, state) {
        if (keyboardMode === "large" && Number.isFinite(note)) {
          const pitch = pitchClassFromMidi(note);
          keyboard.querySelectorAll(`[data-pitch="${pitch}"]`).forEach(key => key.classList.add(state));
        } else {
          const selector = Number.isFinite(note)
            ? `[data-midi="${note}"]`
            : `[data-note="${CSS.escape(String(note))}"]`;
          const key = keyboard.querySelector(selector);
          if (key) key.classList.add(state);
        }
      }

      function resetKeys() {
        keyboard.querySelectorAll("button").forEach(key => key.classList.remove("correct", "wrong", "hint"));
      }

      function matchValueFromMidi(midi) {
        return keyboardMode === "large" ? pitchClassFromMidi(midi) : midi;
      }

      function matchValueFromNote(note) {
        return matchValueFromMidi(noteMidi(note));
      }

      function questionMatchValues() {
        return [...new Set(questionNotes.map(matchValueFromNote))];
      }

      function evaluateMultiInput() {
        multiInputTimer = null;
        const targetValues = questionMatchValues();
        const isCorrect = targetValues.length === multiPressedValues.size
          && targetValues.every(value => multiPressedValues.has(value));
        const previouslyWrong = feedbackType === "wrong";
        resetKeys();

        if (isCorrect) {
          questionNotes.forEach(note => setKeyState(noteMidi(note), "correct"));
          feedbackType = "correct";
          if (!previouslyWrong) {
            score.correct += 1;
            score.total += 1;
            updateScore();
            saveState();
          }
          showFeedback(t("correct"), "correct");
          advanceTimer = setTimeout(() => {
            advanceTimer = null;
            generateQuestion();
          }, 900);
        } else {
          if (!previouslyWrong) {
            score.total += 1;
            updateScore();
            saveState();
          }
          questionNotes.forEach(note => setKeyState(noteMidi(note), "hint"));
          showFeedback(t("multiHint", targetValues.length), "wrong");
          feedbackType = "wrong";
        }
        multiPressedValues.clear();
      }

      function keepWaitingForMultiInput() {
        multiInputTimer = null;
        if (!multiPressedValues.size || feedbackType === "correct") return;
        showFeedback(t("continueInput", multiPressedValues.size, questionMatchValues().length), "correct");
      }

      function pressMultiKey(pressedMidi) {
        if (!Number.isFinite(pressedMidi)) return;
        if (feedbackType === "correct") return;
        const targetCount = questionMatchValues().length;
        if (multiPressedValues.size === 0) resetKeys();
        multiPressedValues.add(matchValueFromMidi(pressedMidi));
        setKeyState(pressedMidi, "correct");
        showFeedback(t("entered", Math.min(multiPressedValues.size, targetCount), targetCount), "correct");

        if (multiInputTimer !== null) clearTimeout(multiInputTimer);
        if (multiPressedValues.size >= targetCount) {
          evaluateMultiInput();
        } else {
          multiInputTimer = setTimeout(keepWaitingForMultiInput, MULTI_INPUT_GRACE_MS);
        }
      }

      function pressKey(pressedKey, options = {}) {
        if (!currentNote || feedbackType === "correct") return;
        if (options.playSound !== false) playPressedKey(pressedKey);
        const pressedMidi = typeof pressedKey === "object" ? pressedKey.midi : null;
        if (questionNotes.length > 1) {
          pressMultiKey(pressedMidi);
          return;
        }
        const answerMidi = noteMidi(currentNote);
        const answer = expectedPitchLabel(currentNote);
        const previouslyWrong = feedbackType === "wrong";
        const isCorrect = keyboardMode === "large"
          ? pressedMidi !== null && pitchClassFromMidi(pressedMidi) === pitchClassFromMidi(answerMidi)
          : pressedMidi === answerMidi;
        resetKeys();

        if (isCorrect) {
          setKeyState(answerMidi, "correct");
          feedbackType = "correct";
          if (!previouslyWrong) {
            score.correct += 1;
            score.total += 1;
            updateScore();
            saveState();
          }
          clearAdvanceTimer();
          if (currentAnswerIndex < questionNotes.length - 1) {
            showFeedback(t("partialCorrect", currentAnswerIndex + 1, questionNotes.length), "correct");
            advanceTimer = setTimeout(() => {
              advanceTimer = null;
              currentAnswerIndex += 1;
              currentNote = questionNotes[currentAnswerIndex];
              feedbackType = null;
              resetKeys();
              showFeedback("", null);
              drawStaff();
            }, 520);
          } else {
            showFeedback(t("correct"), "correct");
            advanceTimer = setTimeout(() => {
              advanceTimer = null;
              generateQuestion();
            }, 1000);
          }
        } else {
          if (!previouslyWrong) {
            score.total += 1;
            updateScore();
            saveState();
          }
          setKeyState(pressedMidi, "wrong");
          setKeyState(answerMidi, "hint");
          showFeedback(t("singleHint", currentAnswerIndex + 1, answer), "wrong");
          feedbackType = "wrong";
        }
      }

      function drawStaff() {
        staffShell.classList.toggle("hidden-staff", !showStaff);
        staff.replaceChildren();
        if (!showStaff) return;
        const stepHeight = 6 * STAFF_SCALE;
        const noteYValues = questionNotes.map(note => STAFF_CENTER_Y - note[2] * stepHeight);
        const minY = Math.min(0, ...noteYValues.map(y => y - 58));
        const maxY = Math.max(STAFF_BASE_HEIGHT, ...noteYValues.map(y => y + 58));
        staff.setAttribute("viewBox", `0 ${minY} 300 ${maxY - minY}`);
        staff.append(svg("rect", { x:0, y:minY, width:300, height:maxY - minY, fill:"transparent" }));
        const group = svg("g", { transform:`translate(0,${STAFF_CENTER_Y})` });
        staff.append(group);

        [-24,-12,0,12,24].forEach(y => {
          group.append(svg("line", {
            x1:18, y1:y * STAFF_SCALE, x2:282, y2:y * STAFF_SCALE, stroke:"hsl(20 20% 15%)",
            "stroke-width":1.35, "stroke-opacity":.45
          }));
        });

        group.append(svg("text", {
          x:28, y:(clef === "treble" ? 24 : 8) * STAFF_SCALE,
          "font-size":(clef === "treble" ? 56 : 40) * STAFF_SCALE,
          "font-family":"serif", fill:"hsl(20 25% 25%)", "text-anchor":"middle"
        }, clef === "treble" ? "𝄞" : "𝄢"));

        KEY_SIGNATURES[keySig].accidentals.forEach(([letter, type], index) => {
          const staffY = ACC_Y[type][clef][letter] || 0;
          group.append(svg("text", {
            x:60 + index * 13.5,
            y:(staffY + (type === "sharp" ? 5.76 : 2.7)) * STAFF_SCALE,
            "font-size":27, "font-family":"serif",
            fill:"hsl(20 20% 15%)", "text-anchor":"middle"
          }, type === "sharp" ? "♯" : "♭"));
        });

        if (!questionNotes.length) return;
        const spacing = questionNotes.length === 1 ? 0 : Math.min(34, 128 / (questionNotes.length - 1));
        const noteCenterX = questionNotes.length === 1 ? 170 : 198;
        const firstX = noteCenterX - spacing * (questionNotes.length - 1) / 2;

        questionNotes.forEach((note, index) => {
          const isCurrent = index === currentAnswerIndex;
          const ink = isCurrent ? "hsl(20 25% 25%)" : "hsl(20 14% 45%)";
          const noteGroup = svg("g", {
            transform:`translate(${firstX + index * spacing}, ${-note[2] * stepHeight})`,
            opacity:isCurrent ? 1 : .58
          });
          group.append(noteGroup);
          appendLedgerLines(noteGroup, note[2], ink);
          noteGroup.append(svg("ellipse", {
            cx:0, cy:0, rx:12.75, ry:8.85,
            fill:ink, transform:"rotate(-12)"
          }));
          const label = currentNoteLabel(note);
          if (label) {
            noteGroup.append(svg("text", {
              x:0, y:2.2,
              "font-size":label.length > 1 ? 9.3 : 10.95,
              "font-family":"ui-monospace, SFMono-Regular, Menlo, monospace",
              "font-weight":800,
              fill:"#fff",
              "text-anchor":"middle",
              "pointer-events":"none"
            }, label));
          }
          const stemUp = note[2] < 0;
          noteGroup.append(svg("line", {
            x1:stemUp ? 10.8 : -10.8, y1:stemUp ? -1.8 : 1.8,
            x2:stemUp ? 10.8 : -10.8, y2:stemUp ? -45 : 45,
            stroke:ink, "stroke-width":2.1
          }));
        });
      }

      function appendLedgerLines(noteGroup, step, ink) {
        if (Math.abs(step) < 6) return;
        const direction = step > 0 ? 1 : -1;
        for (let ledgerStep = 6 * direction; Math.abs(ledgerStep) <= Math.abs(step); ledgerStep += 2 * direction) {
          noteGroup.append(svg("line", {
            x1:-16.5,
            y1:(step - ledgerStep) * 6 * STAFF_SCALE,
            x2:16.5,
            y2:(step - ledgerStep) * 6 * STAFF_SCALE,
            stroke:ink,
            "stroke-width":1.8,
            "stroke-opacity":.5
          }));
        }
      }

      function blackLabel(sharpName) {
        if (!(keySig.includes("b") || keySig === "F")) return sharpName;
        return { "C#":"Db", "D#":"Eb", "F#":"Gb", "G#":"Ab", "A#":"Bb" }[sharpName];
      }

      function makeKey(note, octave, midi, isBlack, left) {
        const label = `${note}${octave}`;
        const button = document.createElement("button");
        button.type = "button";
        button.className = isBlack ? "black-key" : "white-key";
        button.dataset.note = label;
        button.dataset.midi = String(midi);
        button.dataset.pitch = String(pitchClassFromMidi(midi));
        button.style.left = `${left}px`;
        button.setAttribute("aria-label", label);
        button.textContent = !isBlack && note === "C" ? label : "";
        button.addEventListener("click", () => pressKey({ note, octave, midi, label }));
        return button;
      }

      function notePartsFromMidi(midi) {
        const sharpNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        return {
          note:sharpNames[pitchClassFromMidi(midi)],
          octave:Math.floor(midi / 12) - 1
        };
      }

      function isWhiteMidi(midi) {
        return [0, 2, 4, 5, 7, 9, 11].includes(pitchClassFromMidi(midi));
      }

      function drawFullKeyboard(whiteWidth, blackWidth) {
        let whiteIndex = 0;
        for (let midi = PIANO_LOW_MIDI; midi <= PIANO_HIGH_MIDI; midi += 1) {
          const { note, octave } = notePartsFromMidi(midi);
          if (isWhiteMidi(midi)) {
            keyboard.append(makeKey(note, octave, midi, false, whiteIndex * whiteWidth));
            whiteIndex += 1;
          } else {
            keyboard.append(makeKey(blackLabel(note), octave, midi, true, whiteIndex * whiteWidth - blackWidth / 2));
          }
        }
        keyboard.style.width = `${whiteIndex * whiteWidth}px`;
      }

      function drawKeyboard() {
        const isLargeKeyboard = keyboardMode === "large";
        const whiteWidth = isLargeKeyboard ? LARGE_WHITE_KEY_WIDTH : WHITE_KEY_WIDTH;
        keyboard.classList.toggle("large", isLargeKeyboard);
        keyboard.replaceChildren();
        if (isLargeKeyboard) {
          const whites = ["C","D","E","F","G","A","B"];
          const blacks = { C:"C#", D:"D#", F:"F#", G:"G#", A:"A#" };
          keyboard.style.width = `${LARGE_OCTAVE_WIDTH}px`;
          whites.forEach((note, index) => {
            const midi = (LARGE_KEYBOARD_OCTAVE + 1) * 12 + pitchClass(note);
            keyboard.append(makeKey(note, LARGE_KEYBOARD_OCTAVE, midi, false, index * whiteWidth));
          });
          whites.forEach((note, index) => {
            if (!blacks[note]) return;
            const blackNote = blackLabel(blacks[note]);
            const midi = (LARGE_KEYBOARD_OCTAVE + 1) * 12 + pitchClass(blacks[note]);
            keyboard.append(makeKey(blackNote, LARGE_KEYBOARD_OCTAVE, midi, true, index * whiteWidth + LARGE_BLACK_KEY_OFFSET));
          });
        } else {
          drawFullKeyboard(whiteWidth, BLACK_KEY_WIDTH);
        }
        updateKeyboardRange();
      }

      function updateKeyboardRange() {
        if (keyboardMode === "large") return;
        const octave = keyboardDisplayOctave;
        keyboardRange.textContent = `A0-C8`;
        keyboardLeftButton.disabled = octave <= 1;
        keyboardRightButton.disabled = octave >= 7;
      }

      function scrollKeyboardToMidi(midi, behavior = "smooth") {
        const key = keyboard.querySelector(`[data-midi="${midi}"]`);
        if (!key) return;
        const keyCenter = key.offsetLeft + key.offsetWidth / 2;
        const maxLeft = Math.max(0, keyboard.scrollWidth - keyboardScroll.clientWidth);
        const left = Math.min(maxLeft, Math.max(0, keyCenter - keyboardScroll.clientWidth / 2));
        keyboardScroll.scrollTo({ left, behavior });
      }

      function scrollKeyboardToOctave(octave, behavior = "smooth") {
        if (keyboardMode === "large") {
          keyboardDisplayOctave = LARGE_KEYBOARD_OCTAVE;
          keyboardScroll.scrollTo({ left:0, behavior });
          return;
        }
        const targetOctave = Math.min(7, Math.max(1, octave));
        keyboardDisplayOctave = targetOctave;
        updateKeyboardRange();
        requestAnimationFrame(() => scrollKeyboardToMidi((targetOctave + 1) * 12, behavior));
      }

      function scrollKeyboardByOctave(direction) {
        scrollKeyboardToOctave(keyboardDisplayOctave + direction);
      }

      function defaultKeyboardOctave() {
        return 4;
      }

      renderKeySignatureOptions();

      languageSelect.addEventListener("change", () => {
        uiLanguage = languageSelect.value;
        applyLanguage();
        saveState();
      });

      keySelect.addEventListener("change", () => {
        const nextKeySig = keySelect.value;
        if (isLockedKey(nextKeySig)) {
          keySelect.value = keySig;
          unlockPromptRequested = true;
          updateUnlockUi(t("unlockText"));
          return;
        }
        keySig = nextKeySig;
        saveState();
        drawKeyboard();
        generateQuestion();
      });

      function setClef(nextClef) {
        clef = nextClef;
        trebleButton.classList.toggle("active", clef === "treble");
        bassButton.classList.toggle("active", clef === "bass");
        trebleButton.setAttribute("aria-pressed", clef === "treble");
        bassButton.setAttribute("aria-pressed", clef === "bass");
        saveState();
        scrollKeyboardToOctave(defaultKeyboardOctave());
        generateQuestion();
      }

      trebleButton.addEventListener("click", () => setClef("treble"));
      bassButton.addEventListener("click", () => setClef("bass"));
      keyboardLeftButton.addEventListener("click", () => scrollKeyboardByOctave(-1));
      keyboardRightButton.addEventListener("click", () => scrollKeyboardByOctave(1));
      function setStaffVisibility(nextShowStaff) {
        showStaff = nextShowStaff;
        showStaffButton.classList.toggle("active", showStaff);
        hideStaffButton.classList.toggle("active", !showStaff);
        showStaffButton.setAttribute("aria-pressed", showStaff);
        hideStaffButton.setAttribute("aria-pressed", !showStaff);
        saveState();
        drawStaff();
      }
      showStaffButton.addEventListener("click", () => setStaffVisibility(true));
      hideStaffButton.addEventListener("click", () => setStaffVisibility(false));
      function setDifficulty(nextDifficulty) {
        difficulty = nextDifficulty;
        easyButton.classList.toggle("active", difficulty === "easy");
        hardButton.classList.toggle("active", difficulty === "hard");
        easyButton.setAttribute("aria-pressed", difficulty === "easy");
        hardButton.setAttribute("aria-pressed", difficulty === "hard");
        saveState();
        generateQuestion();
      }
      easyButton.addEventListener("click", () => setDifficulty("easy"));
      hardButton.addEventListener("click", () => setDifficulty("hard"));
      function setKeyboardMode(nextMode) {
        keyboardMode = nextMode;
        smallKeyboardButton.classList.toggle("active", keyboardMode === "small");
        largeKeyboardButton.classList.toggle("active", keyboardMode === "large");
        smallKeyboardButton.setAttribute("aria-pressed", keyboardMode === "small");
        largeKeyboardButton.setAttribute("aria-pressed", keyboardMode === "large");
        saveState();
        drawKeyboard();
        scrollKeyboardToOctave(defaultKeyboardOctave(), "auto");
        resetKeys();
      }
      smallKeyboardButton.addEventListener("click", () => setKeyboardMode("small"));
      largeKeyboardButton.addEventListener("click", () => setKeyboardMode("large"));
      midiConnectButton.addEventListener("click", connectMidi);

      function updateWakeLockStatus(message) {
        wakeLockStatus.textContent = message;
      }

      async function requestWakeLock() {
        if (!("wakeLock" in navigator)) {
          updateWakeLockStatus(t("wakeUnsupported"));
          return;
        }
        if (document.visibilityState !== "visible") return;
        try {
          wakeLock = await navigator.wakeLock.request("screen");
          updateWakeLockStatus(t("wakeOn"));
          wakeLock.addEventListener("release", () => {
            wakeLock = null;
            if (document.visibilityState === "visible") updateWakeLockStatus(t("wakeReleased"));
          });
        } catch (_) {
          updateWakeLockStatus(t("wakeRetry"));
        }
      }

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible" && !wakeLock) requestWakeLock();
      });
      document.addEventListener("pointerdown", requestWakeLock, { once:true });

      function isStandaloneDisplay() {
        return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
      }

      function isNativeIOSApp() {
        return navigator.userAgent.includes("MusicNoteQuizIOS");
      }

      function showInstallPrompt(text) {
        if (isNativeIOSApp()) return;
        if (isStandaloneDisplay() || sessionStorage.getItem("music-note-install-dismissed") === "1") return;
        if (text) installText.textContent = text;
        installPrompt.hidden = false;
      }

      window.addEventListener("beforeinstallprompt", event => {
        event.preventDefault();
        deferredInstallPrompt = event;
        showInstallPrompt(t("installText"));
      });

      installButton.addEventListener("click", async () => {
        if (deferredInstallPrompt) {
          const promptEvent = deferredInstallPrompt;
          deferredInstallPrompt = null;
          promptEvent.prompt();
          await promptEvent.userChoice.catch(() => {});
          installPrompt.hidden = true;
        } else {
          installText.textContent = t("installHelp");
        }
      });

      installDismissButton.addEventListener("click", () => {
        sessionStorage.setItem("music-note-install-dismissed", "1");
        installPrompt.hidden = true;
      });

      window.addEventListener("appinstalled", () => {
        installPrompt.hidden = true;
      });

      window.addEventListener("load", () => {
        setTimeout(() => {
          if (!deferredInstallPrompt) showInstallPrompt(t("installHelp"));
        }, 1200);
      });
      noteLabelInputs.forEach(input => {
        input.addEventListener("change", () => {
          noteLabelMode = input.value;
          saveState();
          drawStaff();
        });
      });
      soundCountInputs.forEach(input => {
        input.addEventListener("change", () => {
          soundCount = Number.parseInt(input.value, 10) || 1;
          saveState();
          generateQuestion();
        });
      });
      nextButton.addEventListener("click", generateQuestion);
      replayButton.addEventListener("click", playQuestionNotes);
      forceUpdateButton.addEventListener("click", forceUpdateApp);
      unlockKeysButton.addEventListener("click", requestUnlockKeys);
      restorePurchaseButton.addEventListener("click", restoreUnlockKeys);
      audioEnableButton.addEventListener("click", () => unlockAudio({ replay:true }));
      document.addEventListener("pointerdown", unlockAudio, { once:true });
      window.addEventListener("load", requestWakeLock);
      window.addEventListener("load", () => setTimeout(showAudioPrompt, 700));

      if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }

      async function forceUpdateApp() {
        forceUpdateButton.disabled = true;
        forceUpdateButton.textContent = t("updating");
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(registration => registration.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map(key => caches.delete(key)));
          }
        } catch (_) {
          // Reload anyway; the cache-busting URL still forces a fresh request in most cases.
        }
        const url = new URL(window.location.href);
        url.searchParams.set("forceUpdate", Date.now().toString());
        window.location.replace(url.toString());
      }

      refreshSavedSettings();
      restoreIndexedDbState();
    })();
  </script>
</body>
</html>
