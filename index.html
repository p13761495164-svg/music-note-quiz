<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description" content="离线可运行的音符识谱练习">
  <title>音符识谱练习</title>
  <style>
    :root {
      color-scheme: light;
      --bg: hsl(40 33% 96%);
      --fg: hsl(20 20% 15%);
      --muted: hsl(25 10% 45%);
      --border: hsl(30 15% 85%);
      --card: hsl(40 33% 98%);
      --primary: hsl(20 25% 25%);
      --secondary: hsl(35 25% 90%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--fg);
    }
    button, select { font: inherit; }
    button { touch-action: manipulation; }

    main {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      width: min(672px, 100%);
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
      border-radius: 12px;
      background: var(--card);
      box-shadow: 0 14px 30px rgba(45, 34, 28, .12);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
    }
    h1 {
      margin: 0;
      font: 700 24px/1.2 Georgia, "Times New Roman", serif;
    }
    .subtitle, .score-label {
      color: var(--muted);
      font-size: 13px;
    }
    .subtitle { margin-top: 5px; }
    .score { text-align: right; }
    .score-label {
      font-weight: 700;
      letter-spacing: .13em;
    }
    .score-value {
      margin-top: 2px;
      color: var(--primary);
      font: 700 24px/1.1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .score-value span { color: var(--muted); font-size: 19px; }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px;
    }

    .settings {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: stretch;
      gap: 10px;
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--border) 55%, transparent);
      border-radius: 9px;
      background: color-mix(in srgb, var(--secondary) 36%, transparent);
    }
    .setting {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 6px;
    }
    .setting-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.1;
    }
    select {
      width: 100%;
      min-height: 34px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--card);
      color: var(--fg);
    }
    .segmented {
      display: flex;
      width: 100%;
      gap: 2px;
      padding: 3px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--card);
    }
    .segmented button {
      flex: 1 1 0;
      min-width: 0;
      min-height: 30px;
      padding: 0 5px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: var(--fg);
      font-size: 14px;
      cursor: pointer;
    }
    .segmented button.active {
      background: var(--primary);
      color: var(--bg);
    }
    .radio-group {
      display: flex;
      width: 100%;
      gap: 2px;
      padding: 3px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--card);
    }
    .radio-choice {
      position: relative;
      flex: 1 1 0;
      min-width: 0;
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      border-radius: 5px;
      color: var(--fg);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .radio-choice input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .radio-choice:has(input:checked) {
      background: var(--primary);
      color: var(--bg);
    }
    .sound-count-group { gap: 3px; }
    .sound-count-group .radio-choice {
      min-width: 0;
      padding: 0 2px;
    }

    .staff-shell {
      position: relative;
      width: min(448px, 100%);
      aspect-ratio: 3 / 1;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      box-shadow: 0 2px 4px rgba(45, 34, 28, .06);
    }
    #staff { display: block; width: 100%; height: 100%; }
    .replay-button {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      display: none;
      min-width: 120px;
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      background: var(--primary);
      color: var(--bg);
      font-weight: 750;
      font-size: 16px;
      box-shadow: 0 8px 22px rgba(90, 67, 56, .18);
      cursor: pointer;
    }
    .staff-shell.hidden-staff #staff { display: none; }
    .staff-shell.hidden-staff .replay-button { display: inline-flex; align-items: center; justify-content: center; }

    .feedback {
      height: 0;
      display: grid;
      place-items: center;
      margin: -6px 0 -8px;
      overflow: visible;
      position: relative;
      z-index: 3;
    }
    .feedback-pill {
      display: none;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border: 1px solid;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 650;
    }
    .feedback-pill.show { display: flex; animation: appear .18s ease-out; }
    .feedback-pill.correct { border-color: #bbdfc4; background: #eaf7ed; color: #216b35; }
    .feedback-pill.wrong { border-color: #efcaca; background: #fff0f0; color: #8c2929; }
    @keyframes appear { from { opacity: 0; transform: translateY(5px); } }

    .keyboard-scroll {
      width: 100%;
      overflow-x: auto;
      padding: 0 0 4px;
      scroll-behavior: smooth;
    }
    .keyboard {
      position: relative;
      width: 1344px;
      height: 148px;
      margin: 0 auto;
      user-select: none;
    }
    .keyboard-controls {
      width: min(448px, 100%);
      display: none;
      align-items: center;
      justify-content: center;
      margin: 0;
      position: relative;
      z-index: 4;
    }
    .keyboard-shift {
      display: none;
      min-width: 44px;
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--primary);
      font-weight: 900;
      cursor: pointer;
    }
    .keyboard-range {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .white-key, .black-key {
      position: absolute;
      bottom: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      border-radius: 0 0 7px 7px;
      cursor: pointer;
      transition: background-color .16s, color .16s, transform .08s;
      transform-origin: top;
    }
    .white-key:active, .black-key:active { transform: scaleY(.97); }
    .white-key {
      z-index: 1;
      width: 32px;
      height: 148px;
      padding-bottom: 14px;
      border: 1px solid #c9c9c9;
      background: #fff;
      color: #5b5b5b;
      font-size: 15px;
      font-weight: 650;
      box-shadow: 0 2px 3px rgba(0,0,0,.08);
    }
    .black-key {
      z-index: 2;
      top: 0;
      bottom: auto;
      width: 22px;
      height: 88px;
      padding-bottom: 8px;
      border: 1px solid #171717;
      background: #202020;
      color: #aaa;
      font-size: 11px;
      box-shadow: 0 3px 5px rgba(0,0,0,.24);
    }
    .keyboard.large {
      width: 336px;
    }
    .keyboard.large .white-key {
      width: 48px;
      font-size: 17px;
    }
    .keyboard.large .black-key {
      width: 32px;
    }
    .white-key.correct, .black-key.correct { border-color: #1f9d4c; background: #35b95d; color: #fff; }
    .white-key.wrong, .black-key.wrong { border-color: #c63636; background: #e04b4b; color: #fff; }
    .white-key.hint, .black-key.hint { border-color: #d99a14; background: #f2bd3f; color: #5a3b00; }
    .white-key[data-note="C4"] { color: #c7352e; }
    .white-key[data-note="C4"].correct,
    .white-key[data-note="C4"].wrong { color: #fff; }
    .white-key[data-note="C4"].hint { color: #5a3b00; }

    .next {
      display: none;
      min-height: 38px;
      padding: 0 17px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--card);
      color: var(--fg);
      cursor: pointer;
    }
    .next.show { display: block; }

    @media (max-width: 560px) {
      main { display: block; padding: 10px 0 0; }
      .card { min-height: 100dvh; border: 0; border-radius: 0; box-shadow: none; }
      header, .content { padding: 18px; }
      .content { gap: 10px; }
      .settings {
        gap: 8px;
        padding: 10px;
      }
      .keyboard { margin-inline: 18px; }
      .keyboard-controls { width: calc(100% - 36px); }
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-label="识谱练习">
      <header>
        <div>
          <h1>识谱练习</h1>
          <div class="subtitle">Note Reading Practice</div>
        </div>
        <div class="score" aria-live="polite">
          <div class="score-label">分数</div>
          <div class="score-value"><b id="correct-score">0</b> <span>/ <b id="total-score">0</b></span></div>
        </div>
      </header>

      <div class="content">
        <div class="settings">
          <label class="setting">
            <span class="setting-label">调号:</span>
            <select id="key-signature" aria-label="调号"></select>
          </label>
          <div class="setting">
            <span class="setting-label">谱号:</span>
            <div class="segmented" role="group" aria-label="谱号">
              <button id="treble-button" class="active" type="button" aria-pressed="true">高音</button>
              <button id="bass-button" type="button" aria-pressed="false">低音</button>
            </div>
          </div>
          <div class="setting">
            <span class="setting-label">音符:</span>
            <div class="radio-group" role="radiogroup" aria-label="音符显示">
              <label class="radio-choice"><input type="radio" name="note-label-mode" value="letter">音高</label>
              <label class="radio-choice"><input type="radio" name="note-label-mode" value="degree">级数</label>
              <label class="radio-choice"><input type="radio" name="note-label-mode" value="none" checked>隐藏</label>
            </div>
          </div>
          <div class="setting">
            <span class="setting-label">谱面:</span>
            <div class="segmented" role="group" aria-label="五线谱显示">
              <button id="show-staff-button" class="active" type="button" aria-pressed="true">显示</button>
              <button id="hide-staff-button" type="button" aria-pressed="false">隐藏</button>
            </div>
          </div>
          <label class="setting">
            <span class="setting-label">声音:</span>
            <div class="radio-group sound-count-group" role="radiogroup" aria-label="声音个数">
              <label class="radio-choice"><input type="radio" name="sound-count" value="1" checked>1</label>
              <label class="radio-choice"><input type="radio" name="sound-count" value="2">2</label>
              <label class="radio-choice"><input type="radio" name="sound-count" value="3">3</label>
              <label class="radio-choice"><input type="radio" name="sound-count" value="4">4</label>
              <label class="radio-choice"><input type="radio" name="sound-count" value="5">5</label>
            </div>
          </label>
          <div class="setting">
            <span class="setting-label">难度:</span>
            <div class="segmented" role="group" aria-label="难度">
              <button id="easy-button" class="active" type="button" aria-pressed="true">易</button>
              <button id="hard-button" type="button" aria-pressed="false">难</button>
            </div>
          </div>
          <div class="setting">
            <span class="setting-label">琴键:</span>
            <div class="segmented" role="group" aria-label="琴键大小">
              <button id="small-keyboard-button" class="active" type="button" aria-pressed="true">小</button>
              <button id="large-keyboard-button" type="button" aria-pressed="false">大</button>
            </div>
          </div>
        </div>

        <div id="staff-shell" class="staff-shell">
          <svg id="staff" viewBox="0 0 300 120" role="img" aria-label="五线谱题目"></svg>
          <button id="replay-button" class="replay-button" type="button">重听</button>
        </div>

        <div class="feedback" aria-live="polite">
          <div id="feedback-pill" class="feedback-pill"></div>
        </div>

        <div class="keyboard-controls" aria-label="Keyboard range controls">
          <button id="keyboard-left" class="keyboard-shift" type="button" aria-label="Lower keyboard range">‹</button>
          <div id="keyboard-range" class="keyboard-range">C4-B4</div>
          <button id="keyboard-right" class="keyboard-shift" type="button" aria-label="Higher keyboard range">›</button>
        </div>
        <div id="keyboard-scroll" class="keyboard-scroll">
          <div id="keyboard" class="keyboard" aria-label="钢琴键盘"></div>
        </div>

        <button id="next-button" class="next" type="button">下一题</button>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const KEY_SIGNATURES = {
        C:  { name: "C大调",  accidentals: [] },
        G:  { name: "G大调",  accidentals: [["F", "sharp"]] },
        D:  { name: "D大调",  accidentals: [["F", "sharp"], ["C", "sharp"]] },
        A:  { name: "A大调",  accidentals: [["F", "sharp"], ["C", "sharp"], ["G", "sharp"]] },
        E:  { name: "E大调",  accidentals: [["F", "sharp"], ["C", "sharp"], ["G", "sharp"], ["D", "sharp"]] },
        B:  { name: "B大调",  accidentals: [["F", "sharp"], ["C", "sharp"], ["G", "sharp"], ["D", "sharp"], ["A", "sharp"]] },
        "F#": { name: "F#大调", accidentals: [["F", "sharp"], ["C", "sharp"], ["G", "sharp"], ["D", "sharp"], ["A", "sharp"], ["E", "sharp"]] },
        F:  { name: "F大调",  accidentals: [["B", "flat"]] },
        Bb: { name: "Bb大调", accidentals: [["B", "flat"], ["E", "flat"]] },
        Eb: { name: "Eb大调", accidentals: [["B", "flat"], ["E", "flat"], ["A", "flat"]] },
        Ab: { name: "Ab大调", accidentals: [["B", "flat"], ["E", "flat"], ["A", "flat"], ["D", "flat"]] },
        Db: { name: "Db大调", accidentals: [["B", "flat"], ["E", "flat"], ["A", "flat"], ["D", "flat"], ["G", "flat"]] }
      };

      const NOTE_LETTERS = ["C", "D", "E", "F", "G", "A", "B"];
      const ACC_Y = {
        sharp: {
          treble: { F:-24, C:-6, G:-30, D:-12, A:6, E:-18 },
          bass: { F:-12, C:6, G:-18, D:0, A:-24, E:-6 }
        },
        flat: {
          treble: { B:0, E:-18, A:6, D:-12, G:12 },
          bass: { B:12, E:-6, A:18, D:0, G:24 }
        }
      };
      const SVG_NS = "http://www.w3.org/2000/svg";
      const STORAGE_KEY = "music-note-quiz-state";
      const DB_NAME = "music-note-quiz";
      const DB_STORE = "state";
      const KEYBOARD_START_OCTAVE = 2;
      const KEYBOARD_OCTAVES = 4;
      const WHITE_KEY_WIDTH = 32;
      const BLACK_KEY_WIDTH = 22;
      const BLACK_KEY_OFFSET = WHITE_KEY_WIDTH - BLACK_KEY_WIDTH / 2;
      const OCTAVE_WIDTH = WHITE_KEY_WIDTH * 7;
      const LARGE_KEYBOARD_OCTAVE = 4;
      const LARGE_WHITE_KEY_WIDTH = 48;
      const LARGE_BLACK_KEY_WIDTH = 32;
      const LARGE_BLACK_KEY_OFFSET = LARGE_WHITE_KEY_WIDTH - LARGE_BLACK_KEY_WIDTH / 2;
      const LARGE_OCTAVE_WIDTH = LARGE_WHITE_KEY_WIDTH * 7;
      const MAX_LEDGER_STEP = 8;

      let clef = "treble";
      let keySig = "C";
      let questionNotes = [];
      let currentAnswerIndex = 0;
      let currentNote = null;
      let feedbackType = null;
      let score = { correct: 0, total: 0 };
      let noteLabelMode = "none";
      let showStaff = true;
      let soundCount = 1;
      let difficulty = "easy";
      let keyboardMode = "small";
      let advanceTimer = null;
      let soundTimers = [];
      let stateUpdatedAt = 0;
      let audioContext = null;
      let keyboardDisplayOctave = 4;

      function applySavedState(saved) {
        if (!saved || typeof saved !== "object") return false;
        if (Object.hasOwn(KEY_SIGNATURES, saved.keySig)) keySig = saved.keySig;
        if (saved.clef === "treble" || saved.clef === "bass") clef = saved.clef;
        if (Number.isInteger(saved.correct) && Number.isInteger(saved.total)
            && saved.correct >= 0 && saved.total >= saved.correct) {
          score = { correct: saved.correct, total: saved.total };
        }
        if (["letter", "degree", "none"].includes(saved.noteLabelMode)) {
          noteLabelMode = saved.noteLabelMode;
        }
        if (typeof saved.showStaff === "boolean") showStaff = saved.showStaff;
        if (Number.isInteger(saved.soundCount) && saved.soundCount >= 1 && saved.soundCount <= 5) {
          soundCount = saved.soundCount;
        }
        if (saved.difficulty === "easy" || saved.difficulty === "hard") difficulty = saved.difficulty;
        if (saved.keyboardMode === "small" || saved.keyboardMode === "large") keyboardMode = saved.keyboardMode;
        stateUpdatedAt = Number.isFinite(saved.updatedAt) ? saved.updatedAt : 0;
        return true;
      }

      try {
        applySavedState(JSON.parse(localStorage.getItem(STORAGE_KEY)));
      } catch (_) {
        // Local storage can be unavailable for some browser privacy settings.
      }

      const keySelect = document.querySelector("#key-signature");
      const trebleButton = document.querySelector("#treble-button");
      const bassButton = document.querySelector("#bass-button");
      const showStaffButton = document.querySelector("#show-staff-button");
      const hideStaffButton = document.querySelector("#hide-staff-button");
      const easyButton = document.querySelector("#easy-button");
      const hardButton = document.querySelector("#hard-button");
      const smallKeyboardButton = document.querySelector("#small-keyboard-button");
      const largeKeyboardButton = document.querySelector("#large-keyboard-button");
      const noteLabelInputs = [...document.querySelectorAll('input[name="note-label-mode"]')];
      const soundCountInputs = [...document.querySelectorAll('input[name="sound-count"]')];
      const feedbackPill = document.querySelector("#feedback-pill");
      const nextButton = document.querySelector("#next-button");
      const replayButton = document.querySelector("#replay-button");
      const keyboard = document.querySelector("#keyboard");
      const keyboardScroll = document.querySelector("#keyboard-scroll");
      const keyboardLeftButton = document.querySelector("#keyboard-left");
      const keyboardRightButton = document.querySelector("#keyboard-right");
      const keyboardRange = document.querySelector("#keyboard-range");
      const staff = document.querySelector("#staff");
      const staffShell = document.querySelector("#staff-shell");

      function svg(name, attrs = {}, text = "") {
        const node = document.createElementNS(SVG_NS, name);
        Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
        if (text) node.textContent = text;
        return node;
      }

      function availableQuestionNotes() {
        const notes = [];
        for (let octave = KEYBOARD_START_OCTAVE; octave < KEYBOARD_START_OCTAVE + KEYBOARD_OCTAVES; octave += 1) {
          NOTE_LETTERS.forEach(letter => {
            const step = staffStep(letter, octave, clef);
            if (Math.abs(step) <= MAX_LEDGER_STEP) notes.push([letter, octave, step]);
          });
        }
        return notes;
      }

      function randomNote(excluded = []) {
        const notes = availableQuestionNotes();
        const candidates = notes.filter(note => !excluded.some(item => item[0] === note[0] && item[1] === note[1]));
        return candidates[Math.floor(Math.random() * candidates.length)];
      }

      function generateQuestionNotes() {
        if (difficulty === "easy" && soundCount > 1) {
          const candidates = availableQuestionNotes();
          for (let attempt = 0; attempt < 300; attempt += 1) {
            const notes = [];
            while (notes.length < soundCount) {
              const possible = candidates.filter(note => {
                if (notes.some(item => item[0] === note[0] && item[1] === note[1])) return false;
                const midiValues = notes.concat([note]).map(noteMidi);
                return Math.max(...midiValues) - Math.min(...midiValues) <= 12;
              });
              if (!possible.length) break;
              notes.push(possible[Math.floor(Math.random() * possible.length)]);
            }
            if (notes.length === soundCount) return notes;
          }
        }
        const notes = [];
        while (notes.length < soundCount) {
          const note = randomNote(notes);
          if (!note) break;
          notes.push(note);
        }
        return notes;
      }

      function clearAdvanceTimer() {
        if (advanceTimer !== null) {
          clearTimeout(advanceTimer);
          advanceTimer = null;
        }
      }

      function clearSoundTimers() {
        soundTimers.forEach(timer => clearTimeout(timer));
        soundTimers = [];
      }

      function generateQuestion() {
        clearAdvanceTimer();
        clearSoundTimers();
        questionNotes = generateQuestionNotes();
        currentAnswerIndex = 0;
        currentNote = questionNotes[currentAnswerIndex] || null;
        feedbackType = null;
        showFeedback("", null);
        resetKeys();
        drawStaff();
        playQuestionNotes();
      }

      function expectedKey(note = currentNote) {
        if (!note) return "";
        const accidental = KEY_SIGNATURES[keySig].accidentals.find(item => item[0] === note[0]);
        if (!accidental) return note[0];
        return note[0] + (accidental[1] === "sharp" ? "#" : "b");
      }

      function pitchClass(note) {
        const base = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 }[note[0]];
        const accidental = note.slice(1);
        if (accidental === "#") return (base + 1) % 12;
        if (accidental === "b") return (base + 11) % 12;
        return base;
      }

      function staffStep(letter, octave, targetClef = clef) {
        const index = NOTE_LETTERS.indexOf(letter);
        const absoluteStep = octave * NOTE_LETTERS.length + index;
        const trebleMiddleLine = 4 * NOTE_LETTERS.length + NOTE_LETTERS.indexOf("B");
        const bassMiddleLine = 3 * NOTE_LETTERS.length + NOTE_LETTERS.indexOf("D");
        return absoluteStep - (targetClef === "bass" ? bassMiddleLine : trebleMiddleLine);
      }

      function noteDegreeLabel(note = currentNote) {
        const tonic = pitchClass(keySig);
        const notePitch = pitchClass(expectedKey(note));
        const majorScale = [0, 2, 4, 5, 7, 9, 11];
        const interval = (notePitch - tonic + 12) % 12;
        const degree = majorScale.indexOf(interval);
        return degree >= 0 ? String(degree + 1) : "";
      }

      function getAudioContext() {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return null;
        if (!audioContext) audioContext = new AudioCtor();
        return audioContext;
      }

      function noteFrequency(note) {
        const midi = noteMidi(note);
        return midiFrequency(midi);
      }

      function currentNoteFrequency() {
        return noteFrequency(currentNote);
      }

      function noteNameFrequency(noteName, octave) {
        const basePitch = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 }[noteName[0]];
        if (!Number.isFinite(basePitch) || !Number.isInteger(octave)) return null;
        const accidental = noteName.slice(1);
        const offset = accidental === "#" ? 1 : accidental === "b" ? -1 : 0;
        const midi = (octave + 1) * 12 + basePitch + offset;
        return midiFrequency(midi);
      }

      function noteMidi(note) {
        if (!note) return null;
        const basePitch = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 }[note[0]];
        if (!Number.isFinite(basePitch)) return null;
        const accidental = expectedKey(note).slice(1);
        const offset = accidental === "#" ? 1 : accidental === "b" ? -1 : 0;
        return (note[1] + 1) * 12 + basePitch + offset;
      }

      function pitchClassFromMidi(midi) {
        return ((midi % 12) + 12) % 12;
      }

      function midiFrequency(midi) {
        if (!Number.isFinite(midi)) return null;
        return 440 * Math.pow(2, (midi - 69) / 12);
      }

      function expectedPitchLabel(note = currentNote) {
        if (!note) return "";
        return `${expectedKey(note)}${note[1]}`;
      }

      function playTone(frequency) {
        const context = frequency ? getAudioContext() : null;
        if (!context) return;

        const play = () => {
          if (context.state !== "running") return;
          const now = context.currentTime;
          const instrument = {
            wave:"sine",
            partials:[1, 4.03],
            levels:[1, 0.3],
            attack:0.004,
            decay:3,
            brightness:5200
          };
          const master = context.createGain();
          const filter = context.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(instrument.brightness, now);
          filter.Q.value = 1.8;
          master.connect(filter);
          filter.connect(context.destination);
          master.gain.setValueAtTime(0.0001, now);
          master.gain.linearRampToValueAtTime(0.33, now + instrument.attack);
          master.gain.exponentialRampToValueAtTime(0.0001, now + instrument.decay);

          instrument.partials.forEach((partial, index) => {
            const oscillator = context.createOscillator();
            const partialGain = context.createGain();
            oscillator.type = instrument.wave;
            oscillator.frequency.setValueAtTime(frequency * partial, now);
            partialGain.gain.value = instrument.levels[index] || 0.1;
            oscillator.connect(partialGain).connect(master);
            oscillator.start(now);
            oscillator.stop(now + instrument.decay + 0.08);
          });
        };

        if (context.state === "suspended") {
          context.resume().then(play).catch(() => {});
          return;
        }
        play();
      }

      function playCurrentNote() {
        const frequency = currentNoteFrequency();
        if (!frequency) return;
        clearSoundTimers();
        playTone(frequency);
      }

      function playQuestionNotes() {
        const frequencies = questionNotes.map(noteFrequency).filter(Boolean);
        if (!frequencies.length) return;
        clearSoundTimers();
        frequencies.forEach((frequency, index) => {
          if (index === 0) {
            playTone(frequency);
          } else {
            soundTimers.push(setTimeout(() => playTone(frequency), index * 650));
          }
        });
      }

      function playPressedKey(key) {
        clearSoundTimers();
        if (typeof key === "object" && Number.isFinite(key.midi)) {
          playTone(midiFrequency(key.midi));
          return;
        }
        if (!currentNote) return;
        playTone(noteNameFrequency(String(key || ""), currentNote[1]));
      }

      function unlockAudio() {
        const context = getAudioContext();
        if (!context) return;
        context.resume().then(playQuestionNotes).catch(() => {});
      }

      function currentNoteLabel(note = currentNote) {
        if (!note || noteLabelMode === "none") return "";
        if (noteLabelMode === "letter") return expectedKey(note);
        return noteDegreeLabel(note);
      }

      function showFeedback(message, type) {
        feedbackPill.className = "feedback-pill";
        feedbackPill.textContent = "";
        nextButton.classList.toggle("show", type === "wrong");
        if (!message) return;
        feedbackPill.textContent = (type === "correct" ? "✓ " : "✕ ") + message;
        feedbackPill.classList.add("show", type);
      }

      function updateScore() {
        document.querySelector("#correct-score").textContent = score.correct;
        document.querySelector("#total-score").textContent = score.total;
      }

      function openStateDb() {
        return new Promise((resolve, reject) => {
          if (!window.indexedDB) return reject(new Error("IndexedDB unavailable"));
          const request = indexedDB.open(DB_NAME, 1);
          request.onupgradeneeded = () => request.result.createObjectStore(DB_STORE);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function writeStateToDb(saved) {
        const db = await openStateDb();
        await new Promise((resolve, reject) => {
          const transaction = db.transaction(DB_STORE, "readwrite");
          transaction.objectStore(DB_STORE).put(saved, STORAGE_KEY);
          transaction.oncomplete = resolve;
          transaction.onerror = () => reject(transaction.error);
        });
        db.close();
      }

      async function readStateFromDb() {
        const db = await openStateDb();
        const saved = await new Promise((resolve, reject) => {
          const request = db.transaction(DB_STORE, "readonly").objectStore(DB_STORE).get(STORAGE_KEY);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
        db.close();
        return saved;
      }

      function refreshSavedSettings() {
        keySelect.value = keySig;
        trebleButton.classList.toggle("active", clef === "treble");
        bassButton.classList.toggle("active", clef === "bass");
        trebleButton.setAttribute("aria-pressed", clef === "treble");
        bassButton.setAttribute("aria-pressed", clef === "bass");
        showStaffButton.classList.toggle("active", showStaff);
        hideStaffButton.classList.toggle("active", !showStaff);
        showStaffButton.setAttribute("aria-pressed", showStaff);
        hideStaffButton.setAttribute("aria-pressed", !showStaff);
        easyButton.classList.toggle("active", difficulty === "easy");
        hardButton.classList.toggle("active", difficulty === "hard");
        easyButton.setAttribute("aria-pressed", difficulty === "easy");
        hardButton.setAttribute("aria-pressed", difficulty === "hard");
        smallKeyboardButton.classList.toggle("active", keyboardMode === "small");
        largeKeyboardButton.classList.toggle("active", keyboardMode === "large");
        smallKeyboardButton.setAttribute("aria-pressed", keyboardMode === "small");
        largeKeyboardButton.setAttribute("aria-pressed", keyboardMode === "large");
        staffShell.classList.toggle("hidden-staff", !showStaff);
        noteLabelInputs.forEach(input => { input.checked = input.value === noteLabelMode; });
        soundCountInputs.forEach(input => { input.checked = Number.parseInt(input.value, 10) === soundCount; });
        updateScore();
        drawKeyboard();
        scrollKeyboardToOctave(defaultKeyboardOctave(), "auto");
        generateQuestion();
      }

      async function restoreIndexedDbState() {
        try {
          const saved = await readStateFromDb();
          if (saved && (Number.isFinite(saved.updatedAt) ? saved.updatedAt : 0) > stateUpdatedAt) {
            applySavedState(saved);
            refreshSavedSettings();
            try {
              localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
            } catch (_) {}
          } else if (!saved) {
            saveState();
          }
        } catch (_) {
          // Some Safari file URLs do not permit persistent IndexedDB storage.
        }
      }

      function saveState() {
        stateUpdatedAt = Date.now();
        const saved = {
          keySig,
          clef,
          correct: score.correct,
          total: score.total,
          noteLabelMode,
          showStaff,
          soundCount,
          difficulty,
          keyboardMode,
          updatedAt: stateUpdatedAt
        };
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
        } catch (_) {
          // Keep the quiz usable even when local storage is unavailable.
        }
        writeStateToDb(saved).catch(() => {});
      }

      function setKeyState(note, state) {
        if (keyboardMode === "large" && Number.isFinite(note)) {
          const pitch = pitchClassFromMidi(note);
          keyboard.querySelectorAll(`[data-pitch="${pitch}"]`).forEach(key => key.classList.add(state));
        } else {
          const selector = Number.isFinite(note)
            ? `[data-midi="${note}"]`
            : `[data-note="${CSS.escape(String(note))}"]`;
          const key = keyboard.querySelector(selector);
          if (key) key.classList.add(state);
        }
      }

      function resetKeys() {
        keyboard.querySelectorAll("button").forEach(key => key.classList.remove("correct", "wrong", "hint"));
      }

      function pressKey(pressedKey) {
        if (!currentNote || feedbackType === "correct") return;
        playPressedKey(pressedKey);
        const pressedMidi = typeof pressedKey === "object" ? pressedKey.midi : null;
        const answerMidi = noteMidi(currentNote);
        const answer = expectedPitchLabel(currentNote);
        const previouslyWrong = feedbackType === "wrong";
        const isCorrect = keyboardMode === "large"
          ? pressedMidi !== null && pitchClassFromMidi(pressedMidi) === pitchClassFromMidi(answerMidi)
          : pressedMidi === answerMidi;
        resetKeys();

        if (isCorrect) {
          setKeyState(answerMidi, "correct");
          feedbackType = "correct";
          if (!previouslyWrong) {
            score.correct += 1;
            score.total += 1;
            updateScore();
            saveState();
          }
          clearAdvanceTimer();
          if (currentAnswerIndex < questionNotes.length - 1) {
            showFeedback(`正确! ${currentAnswerIndex + 1}/${questionNotes.length}`, "correct");
            advanceTimer = setTimeout(() => {
              advanceTimer = null;
              currentAnswerIndex += 1;
              currentNote = questionNotes[currentAnswerIndex];
              feedbackType = null;
              resetKeys();
              showFeedback("", null);
              drawStaff();
            }, 520);
          } else {
            showFeedback("正确!", "correct");
            advanceTimer = setTimeout(() => {
              advanceTimer = null;
              generateQuestion();
            }, 1000);
          }
        } else {
          if (!previouslyWrong) {
            score.total += 1;
            updateScore();
            saveState();
          }
          setKeyState(pressedMidi, "wrong");
          setKeyState(answerMidi, "hint");
          showFeedback(`提示: 第 ${currentAnswerIndex + 1} 个是 ${answer}`, "wrong");
          feedbackType = "wrong";
        }
      }

      function drawStaff() {
        staffShell.classList.toggle("hidden-staff", !showStaff);
        staff.replaceChildren();
        if (!showStaff) return;
        const noteYValues = questionNotes.map(note => 60 - note[2] * 6);
        const minY = Math.min(0, ...noteYValues.map(y => y - 38));
        const maxY = Math.max(120, ...noteYValues.map(y => y + 38));
        staff.setAttribute("viewBox", `0 ${minY} 300 ${maxY - minY}`);
        staff.append(svg("rect", { x:0, y:minY, width:300, height:maxY - minY, fill:"transparent" }));
        const group = svg("g", { transform:"translate(0,60)" });
        staff.append(group);

        [-24,-12,0,12,24].forEach(y => {
          group.append(svg("line", {
            x1:18, y1:y, x2:282, y2:y, stroke:"hsl(20 20% 15%)",
            "stroke-width":.9, "stroke-opacity":.45
          }));
        });

        group.append(svg("text", {
          x:28, y:clef === "treble" ? 24 : 8,
          "font-size":clef === "treble" ? 56 : 40,
          "font-family":"serif", fill:"hsl(20 25% 25%)", "text-anchor":"middle"
        }, clef === "treble" ? "𝄞" : "𝄢"));

        KEY_SIGNATURES[keySig].accidentals.forEach(([letter, type], index) => {
          const staffY = ACC_Y[type][clef][letter] || 0;
          group.append(svg("text", {
            x:60 + index * 9,
            y:staffY + (type === "sharp" ? 5.76 : 2.7),
            "font-size":18, "font-family":"serif",
            fill:"hsl(20 20% 15%)", "text-anchor":"middle"
          }, type === "sharp" ? "♯" : "♭"));
        });

        if (!questionNotes.length) return;
        const spacing = questionNotes.length === 1 ? 0 : Math.min(34, 128 / (questionNotes.length - 1));
        const noteCenterX = questionNotes.length === 1 ? 170 : 198;
        const firstX = noteCenterX - spacing * (questionNotes.length - 1) / 2;

        questionNotes.forEach((note, index) => {
          const isCurrent = index === currentAnswerIndex;
          const ink = isCurrent ? "hsl(20 25% 25%)" : "hsl(20 14% 45%)";
          const noteGroup = svg("g", {
            transform:`translate(${firstX + index * spacing}, ${-note[2] * 6})`,
            opacity:isCurrent ? 1 : .58
          });
          group.append(noteGroup);
          appendLedgerLines(noteGroup, note[2], ink);
          noteGroup.append(svg("ellipse", {
            cx:0, cy:0, rx:8.5, ry:5.9,
            fill:ink, transform:"rotate(-12)"
          }));
          const label = currentNoteLabel(note);
          if (label) {
            noteGroup.append(svg("text", {
              x:0, y:2.2,
              "font-size":label.length > 1 ? 6.2 : 7.3,
              "font-family":"ui-monospace, SFMono-Regular, Menlo, monospace",
              "font-weight":800,
              fill:"#fff",
              "text-anchor":"middle",
              "pointer-events":"none"
            }, label));
          }
          const stemUp = note[2] < 0;
          noteGroup.append(svg("line", {
            x1:stemUp ? 7.2 : -7.2, y1:stemUp ? -1.2 : 1.2,
            x2:stemUp ? 7.2 : -7.2, y2:stemUp ? -30 : 30,
            stroke:ink, "stroke-width":1.4
          }));
        });
      }

      function appendLedgerLines(noteGroup, step, ink) {
        if (Math.abs(step) < 6) return;
        const direction = step > 0 ? 1 : -1;
        for (let ledgerStep = 6 * direction; Math.abs(ledgerStep) <= Math.abs(step); ledgerStep += 2 * direction) {
          noteGroup.append(svg("line", {
            x1:-11,
            y1:(step - ledgerStep) * 6,
            x2:11,
            y2:(step - ledgerStep) * 6,
            stroke:ink,
            "stroke-width":1.2,
            "stroke-opacity":.5
          }));
        }
      }

      function blackLabel(sharpName) {
        if (!(keySig.includes("b") || keySig === "F")) return sharpName;
        return { "C#":"Db", "D#":"Eb", "F#":"Gb", "G#":"Ab", "A#":"Bb" }[sharpName];
      }

      function makeKey(note, octave, isBlack, left) {
        const label = `${note}${octave}`;
        const midi = (octave + 1) * 12 + pitchClass(note);
        const button = document.createElement("button");
        button.type = "button";
        button.className = isBlack ? "black-key" : "white-key";
        button.dataset.note = label;
        button.dataset.midi = String(midi);
        button.dataset.pitch = String(pitchClassFromMidi(midi));
        button.style.left = `${left}px`;
        button.setAttribute("aria-label", label);
        button.textContent = !isBlack && note === "C" ? label : "";
        button.addEventListener("click", () => pressKey({ note, octave, midi, label }));
        return button;
      }

      function drawKeyboard() {
        const whites = ["C","D","E","F","G","A","B"];
        const blacks = { C:"C#", D:"D#", F:"F#", G:"G#", A:"A#" };
        const isLargeKeyboard = keyboardMode === "large";
        const firstOctave = isLargeKeyboard ? LARGE_KEYBOARD_OCTAVE : KEYBOARD_START_OCTAVE;
        const octaveCount = isLargeKeyboard ? 1 : KEYBOARD_OCTAVES;
        const whiteWidth = isLargeKeyboard ? LARGE_WHITE_KEY_WIDTH : WHITE_KEY_WIDTH;
        const octaveWidth = isLargeKeyboard ? LARGE_OCTAVE_WIDTH : OCTAVE_WIDTH;
        const blackOffset = isLargeKeyboard ? LARGE_BLACK_KEY_OFFSET : BLACK_KEY_OFFSET;
        keyboard.classList.toggle("large", isLargeKeyboard);
        keyboard.style.width = `${octaveWidth * octaveCount}px`;
        keyboard.replaceChildren();
        for (let octave = firstOctave; octave < firstOctave + octaveCount; octave += 1) {
          const octaveLeft = (octave - firstOctave) * octaveWidth;
          whites.forEach((note, index) => keyboard.append(makeKey(note, octave, false, octaveLeft + index * whiteWidth)));
          whites.forEach((note, index) => {
            if (blacks[note]) keyboard.append(makeKey(blackLabel(blacks[note]), octave, true, octaveLeft + index * whiteWidth + blackOffset));
          });
        }
        updateKeyboardRange();
      }

      function updateKeyboardRange() {
        if (keyboardMode === "large") return;
        const octave = keyboardDisplayOctave;
        keyboardRange.textContent = `C${octave}-B${octave}`;
        keyboardLeftButton.disabled = octave <= KEYBOARD_START_OCTAVE;
        keyboardRightButton.disabled = octave >= KEYBOARD_START_OCTAVE + KEYBOARD_OCTAVES - 1;
      }

      function scrollKeyboardToOctave(octave, behavior = "smooth") {
        if (keyboardMode === "large") {
          keyboardDisplayOctave = LARGE_KEYBOARD_OCTAVE;
          keyboardScroll.scrollTo({ left:0, behavior });
          return;
        }
        const targetOctave = Math.min(KEYBOARD_START_OCTAVE + KEYBOARD_OCTAVES - 1, Math.max(KEYBOARD_START_OCTAVE, octave));
        keyboardDisplayOctave = targetOctave;
        updateKeyboardRange();
        keyboardScroll.scrollTo({ left:(targetOctave - KEYBOARD_START_OCTAVE) * OCTAVE_WIDTH, behavior });
      }

      function scrollKeyboardByOctave(direction) {
        scrollKeyboardToOctave(keyboardDisplayOctave + direction);
      }

      function defaultKeyboardOctave() {
        return clef === "bass" ? 3 : 4;
      }

      Object.entries(KEY_SIGNATURES).forEach(([value, definition]) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = definition.name;
        keySelect.append(option);
      });

      keySelect.addEventListener("change", () => {
        keySig = keySelect.value;
        saveState();
        drawKeyboard();
        generateQuestion();
      });

      function setClef(nextClef) {
        clef = nextClef;
        trebleButton.classList.toggle("active", clef === "treble");
        bassButton.classList.toggle("active", clef === "bass");
        trebleButton.setAttribute("aria-pressed", clef === "treble");
        bassButton.setAttribute("aria-pressed", clef === "bass");
        saveState();
        scrollKeyboardToOctave(defaultKeyboardOctave());
        generateQuestion();
      }

      trebleButton.addEventListener("click", () => setClef("treble"));
      bassButton.addEventListener("click", () => setClef("bass"));
      keyboardLeftButton.addEventListener("click", () => scrollKeyboardByOctave(-1));
      keyboardRightButton.addEventListener("click", () => scrollKeyboardByOctave(1));
      function setStaffVisibility(nextShowStaff) {
        showStaff = nextShowStaff;
        showStaffButton.classList.toggle("active", showStaff);
        hideStaffButton.classList.toggle("active", !showStaff);
        showStaffButton.setAttribute("aria-pressed", showStaff);
        hideStaffButton.setAttribute("aria-pressed", !showStaff);
        saveState();
        drawStaff();
      }
      showStaffButton.addEventListener("click", () => setStaffVisibility(true));
      hideStaffButton.addEventListener("click", () => setStaffVisibility(false));
      function setDifficulty(nextDifficulty) {
        difficulty = nextDifficulty;
        easyButton.classList.toggle("active", difficulty === "easy");
        hardButton.classList.toggle("active", difficulty === "hard");
        easyButton.setAttribute("aria-pressed", difficulty === "easy");
        hardButton.setAttribute("aria-pressed", difficulty === "hard");
        saveState();
        generateQuestion();
      }
      easyButton.addEventListener("click", () => setDifficulty("easy"));
      hardButton.addEventListener("click", () => setDifficulty("hard"));
      function setKeyboardMode(nextMode) {
        keyboardMode = nextMode;
        smallKeyboardButton.classList.toggle("active", keyboardMode === "small");
        largeKeyboardButton.classList.toggle("active", keyboardMode === "large");
        smallKeyboardButton.setAttribute("aria-pressed", keyboardMode === "small");
        largeKeyboardButton.setAttribute("aria-pressed", keyboardMode === "large");
        saveState();
        drawKeyboard();
        scrollKeyboardToOctave(defaultKeyboardOctave(), "auto");
        resetKeys();
      }
      smallKeyboardButton.addEventListener("click", () => setKeyboardMode("small"));
      largeKeyboardButton.addEventListener("click", () => setKeyboardMode("large"));
      noteLabelInputs.forEach(input => {
        input.addEventListener("change", () => {
          noteLabelMode = input.value;
          saveState();
          drawStaff();
        });
      });
      soundCountInputs.forEach(input => {
        input.addEventListener("change", () => {
          soundCount = Number.parseInt(input.value, 10) || 1;
          saveState();
          generateQuestion();
        });
      });
      nextButton.addEventListener("click", generateQuestion);
      replayButton.addEventListener("click", playQuestionNotes);
      document.addEventListener("pointerdown", unlockAudio, { once:true });

      refreshSavedSettings();
      restoreIndexedDbState();
    })();
  </script>
</body>
</html>
